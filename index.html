<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wumpus World - Advanced AI Explorer</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2ff;
            --safe: #00ff88;
            --danger: #ff0055;
            --gold: #ffcc00;
            --pit: #a855f7;
            --bg: #030508;
            --panel: rgba(10, 15, 25, 0.85);
            --border: rgba(0, 242, 255, 0.2);
            --text: #e0e6ed;
            --text-dim: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 10% 10%, rgba(0, 242, 255, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(168, 85, 247, 0.05) 0%, transparent 40%);
            color: var(--text);
            min-height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .dashboard {
            display: grid;
            grid-template-columns: 320px 1fr 320px;
            gap: 30px;
            width: 100%;
            max-width: 1600px;
            height: 90vh;
            padding: 20px;
        }

        .panel {
            background: var(--panel);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
            position: relative;
        }

        .panel::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 2px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
            opacity: 0.5;
        }

        .panel-header {
            padding: 20px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--primary);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .panel-content {
            padding: 20px;
            flex-grow: 1;
            overflow-y: auto;
        }

        .input-group { margin-bottom: 25px; }
        .input-group label {
            display: block;
            font-size: 10px;
            color: var(--text-dim);
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        .grid-ctrl { display: flex; align-items: center; gap: 15px; }
        input[type="number"] {
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--primary);
            padding: 12px;
            width: 80px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 18px;
            text-align: center;
        }

        .btn {
            width: 100%;
            padding: 16px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            margin-bottom: 15px;
            border: 1px solid transparent;
        }

        .btn-gen {
            background: transparent;
            border-color: var(--primary);
            color: var(--primary);
        }
        .btn-gen:hover { background: rgba(0, 242, 255, 0.1); box-shadow: 0 0 20px rgba(0, 242, 255, 0.2); }

        .btn-dispatch {
            background: rgba(255, 0, 85, 0.1);
            border-color: var(--danger);
            color: var(--danger);
        }
        .btn-dispatch:hover { background: var(--danger); color: white; }

        .legend-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 11px;
            color: var(--text-dim);
        }
        .marker {
            width: 12px;
            height: 12px;
            border-radius: 3px;
        }

        .board-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        canvas {
            max-width: 100%;
            max-height: 100%;
            border-radius: 12px;
            box-shadow: 0 0 60px rgba(0,0,0,0.7);
        }

        .percept-box {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: all 0.3s;
        }
        .percept-box.active { border-color: var(--primary); background: rgba(0, 242, 255, 0.05); }
        .percept-icon { font-size: 24px; }
        .percept-text div:first-child { font-size: 11px; font-weight: 700; }
        .percept-text div:last-child { font-size: 10px; color: var(--text-dim); }

        .log-list {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            line-height: 1.8;
            color: var(--text-dim);
        }
        .log-entry { border-left: 2px solid var(--border); padding-left: 12px; margin-bottom: 8px; }
        .log-entry.success { border-color: var(--safe); color: var(--safe); }
        .log-entry.fail { border-color: var(--danger); color: var(--danger); }

        .tooltip {
            position: fixed;
            background: var(--panel);
            border: 1px solid var(--primary);
            padding: 12px;
            border-radius: 8px;
            font-size: 11px;
            pointer-events: none;
            opacity: 0;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }
        .tooltip.active { opacity: 1; }

        #result-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(3, 5, 8, 0.9);
            backdrop-filter: blur(15px);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            border-radius: 12px;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .result-card {
            text-align: center;
            padding: 40px;
            background: var(--panel);
            border: 1px solid var(--primary);
            border-radius: 24px;
            box-shadow: 0 0 50px rgba(0, 242, 255, 0.2);
            transform: scale(0.9);
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes popIn { to { transform: scale(1); } }

        .result-icon { font-size: 80px; margin-bottom: 20px; }
        .result-title { font-size: 32px; font-weight: 900; letter-spacing: 4px; margin-bottom: 10px; text-transform: uppercase; }
        .result-stats { display: flex; gap: 30px; margin-top: 30px; border-top: 1px solid var(--border); padding-top: 20px; }
        .res-stat { display: flex; flex-direction: column; gap: 5px; }
        .res-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; }
        .res-val { font-size: 20px; font-weight: 700; color: var(--primary); }
    </style>
</head>
<body>
    <div class="dashboard">
        <!-- Left Column -->
        <div class="panel">
            <div class="panel-header">System Config <span>v3.0</span></div>
            <div class="panel-content">
                <div class="input-group">
                    <label>Grid Dimensions</label>
                    <div class="grid-ctrl">
                        <input type="number" id="rows" value="6" min="4" max="10">
                        <span style="color: var(--border)">×</span>
                        <input type="number" id="cols" value="6" min="4" max="10">
                    </div>
                </div>
                <button class="btn btn-gen" onclick="initGame()">○ Generate</button>
                <button class="btn btn-dispatch" id="start-btn" onclick="toggleAI()">▶ Dispatch Agent</button>
                
                <div style="margin-top: 30px;">
                    <div class="panel-title" style="font-size: 10px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 15px; letter-spacing: 2px;">Diagnostics</div>
                    <div style="display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 10px;">
                        <span>Status</span><span id="status-val" style="color: var(--safe)">• READY</span>
                    </div>
                    <div style="display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 10px;">
                        <span>Steps</span><span id="steps-val">0</span>
                    </div>
                </div>
            </div>
            
            <div class="panel-header" style="border-top: 1px solid var(--border); border-bottom: none;">Tactical Legend</div>
            <div class="panel-content" style="flex-grow: 0; padding-bottom: 30px;">
                <div class="legend-grid">
                    <div class="legend-item"><span class="marker" style="background: var(--primary)"></span> Agent</div>
                    <div class="legend-item"><span class="marker" style="background: var(--gold)"></span> Gold</div>
                    <div class="legend-item"><span class="marker" style="background: var(--pit)"></span> Pit</div>
                    <div class="legend-item"><span class="marker" style="background: #ff5500"></span> Wumpus</div>
                    <div class="legend-item"><span class="marker" style="background: rgba(0, 255, 136, 0.2); border: 1px solid var(--safe)"></span> Safe</div>
                    <div class="legend-item"><span class="marker" style="background: rgba(255, 0, 85, 0.2); border: 1px solid var(--danger)"></span> Danger</div>
                </div>
            </div>
        </div>

        <!-- Middle Column -->
        <div class="board-container">
            <canvas id="gameCanvas"></canvas>
            <div id="result-overlay">
                <div class="result-card">
                    <div class="result-icon" id="res-icon">🏆</div>
                    <div class="result-title" id="res-title">Mission Success</div>
                    <div id="res-msg" style="color: var(--text-dim); margin-bottom: 20px;">Objective secured. Gold retrieved.</div>
                    <div class="result-stats">
                        <div class="res-stat"><span class="res-label">Steps</span><span class="res-val" id="res-steps">0</span></div>
                        <div class="res-stat"><span class="res-label">Efficiency</span><span class="res-val" id="res-eff">100%</span></div>
                    </div>
                    <button class="btn btn-gen" style="margin-top: 30px;" onclick="hideResult()">Close Report</button>
                </div>
            </div>
        </div>

        <!-- Right Column -->
        <div class="panel">
            <div class="panel-header">Sensory Input</div>
            <div class="panel-content" style="flex-grow: 0;">
                <div class="percept-box" id="box-breeze">
                    <div class="percept-icon">🌪️</div>
                    <div class="percept-text">
                        <div>Breeze Sensor</div>
                        <div id="stat-breeze">CLEAR</div>
                    </div>
                </div>
                <div class="percept-box" id="box-stench">
                    <div class="percept-icon">🤢</div>
                    <div class="percept-text">
                        <div>Stench Sensor</div>
                        <div id="stat-stench">CLEAR</div>
                    </div>
                </div>
            </div>

            <div class="panel-header" style="border-top: 1px solid var(--border); border-bottom: none;">Mission Log</div>
            <div class="panel-content">
                <div id="mission-log" class="log-list">
                    <div class="log-entry">System online. Initializing neural link...</div>
                </div>
            </div>
        </div>
    </div>

    <div id="tooltip" class="tooltip"></div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const tooltip = document.getElementById('tooltip');
        
        let state = null;
        let agentPos = { x: 0, y: 0 };
        let targetPos = { x: 0, y: 0 };
        let animationId = null;
        let aiInterval = null;

        function initGame() {
            hideResult();
            const rows = parseInt(document.getElementById('rows').value);
            const cols = parseInt(document.getElementById('cols').value);
            
            const rand = (max) => Math.floor(Math.random() * max);
            state = {
                rows, cols,
                agent: [0, 0],
                pits: [],
                wumpus: null,
                gold: null,
                visited: [[0, 0]],
                safe: [[0, 0]],
                danger: [],
                running: false,
                steps: 0,
                breeze: false,
                stench: false
            };

            for(let i=0; i<rows; i++) {
                for(let j=0; j<cols; j++) {
                    if(i===0 && j===0) continue;
                    if(Math.random() < 0.15) state.pits.push([i, j]);
                }
            }

            while(true) {
                let r = rand(rows), c = rand(cols);
                if((r===0 && c===0) || state.pits.some(p => p[0]===r && p[1]===c)) continue;
                state.gold = [r, c]; break;
            }

            while(true) {
                let r = rand(rows), c = rand(cols);
                if((r===0 && c===0) || state.pits.some(p => p[0]===r && p[1]===c) || (state.gold[0]===r && state.gold[1]===c)) continue;
                state.wumpus = [r, c]; break;
            }

            agentPos = { x: 0, y: 0 };
            targetPos = { x: 0, y: 0 };
            
            addLog("Dungeon generated. Map synchronized.");
            updateSensors();
            if(!animationId) animate();
        }

        function addLog(msg, type='') {
            const log = document.getElementById('mission-log');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.textContent = `> ${msg}`;
            log.prepend(entry);
        }

        function updateSensors() {
            const r = state.agent[0], c = state.agent[1];
            state.breeze = state.pits.some(p => Math.abs(p[0]-r) + Math.abs(p[1]-c) === 1);
            state.stench = state.wumpus && (Math.abs(state.wumpus[0]-r) + Math.abs(state.wumpus[1]-c) === 1);
            
            document.getElementById('stat-breeze').textContent = state.breeze ? 'DETECTED' : 'CLEAR';
            document.getElementById('stat-stench').textContent = state.stench ? 'DETECTED' : 'CLEAR';
            document.getElementById('box-breeze').classList.toggle('active', state.breeze);
            document.getElementById('box-stench').classList.toggle('active', state.stench);
            
            document.getElementById('steps-val').textContent = state.steps;
        }

        function toggleAI() {
            if(state.running) {
                terminateAI('STOPPED');
            } else {
                state.running = true;
                document.getElementById('start-btn').textContent = '⏹ Stop Explorer';
                document.getElementById('status-val').textContent = '• ACTIVE';
                document.getElementById('status-val').style.color = 'var(--primary)';
                aiInterval = setInterval(aiStep, 1200); // Balanced speed
            }
        }

        function aiStep() {
            if(!state.running) return;
            
            const r = state.agent[0], c = state.agent[1];
            
            // Knowledge update
            if (!state.breeze && !state.stench) {
                getNeighbors(r, c).forEach(([nr, nc]) => {
                    if (!state.safe.some(s => s[0] === nr && s[1] === nc)) {
                        state.safe.push([nr, nc]);
                        state.danger = state.danger.filter(d => d[0] !== nr || d[1] !== nc);
                    }
                });
            } else {
                getNeighbors(r, c).forEach(([nr, nc]) => {
                    if (!state.safe.some(s => s[0] === nr && s[1] === nc) && 
                        !state.visited.some(v => v[0] === nr && v[1] === nc)) {
                        if (!state.danger.some(d => d[0] === nr && d[1] === nc)) {
                            state.danger.push([nr, nc]);
                        }
                    }
                });
            }

            let nextMove = null;
            const neighbors = getNeighbors(r, c);
            const safeUnvisited = neighbors.filter(([nr, nc]) => 
                state.safe.some(s => s[0] === nr && s[1] === nc) && 
                !state.visited.some(v => v[0] === nr && v[1] === nc)
            );

            if (safeUnvisited.length > 0) {
                nextMove = safeUnvisited[0];
            } else {
                const visitedNeighbors = neighbors.filter(([nr, nc]) => state.visited.some(v => v[0] === nr && v[1] === nc));
                nextMove = visitedNeighbors[Math.floor(Math.random() * visitedNeighbors.length)];
            }

            if (nextMove) {
                const [nr, nc] = nextMove;
                state.agent = [nr, nc];
                state.steps++;
                targetPos = { x: nc, y: nr };
                
                if (!state.visited.some(v => v[0] === nr && v[1] === nc)) state.visited.push([nr, nc]);
                
                addLog(`Navigating to sector [${nr}, ${nc}]`);
                updateSensors();

                const isPit = state.pits.some(p => p[0]===nr && p[1]===nc);
                const isWumpus = state.wumpus && state.wumpus[0]===nr && state.wumpus[1]===nc;

                if(isPit || isWumpus) {
                    addLog(`CRITICAL ERROR: Collision detected with ${isPit ? 'Pit' : 'Wumpus'}.`, 'fail');
                    terminateAI('FAILED');
                } else if(state.gold[0]===nr && state.gold[1]===nc) {
                    addLog("MISSION COMPLETE: Gold extracted successfully.", 'success');
                    terminateAI('SUCCESS');
                }
            }
        }

        function getNeighbors(r, c) {
            const adj = [[0,1],[0,-1],[1,0],[-1,0]];
            const n = [];
            adj.forEach(([dr, dc]) => {
                const nr = r + dr, nc = c + dc;
                if (nr >= 0 && nr < state.rows && nc >= 0 && nc < state.cols) n.push([nr, nc]);
            });
            return n;
        }

        function terminateAI(status) {
            state.running = false;
            clearInterval(aiInterval);
            document.getElementById('start-btn').textContent = '▶ Dispatch Agent';
            document.getElementById('status-val').textContent = `• ${status}`;
            document.getElementById('status-val').style.color = status === 'SUCCESS' ? 'var(--safe)' : 'var(--danger)';
            
            if(status === 'SUCCESS' || status === 'FAILED') {
                setTimeout(() => {
                    const overlay = document.getElementById('result-overlay');
                    const isWin = status === 'SUCCESS';
                    document.getElementById('res-icon').textContent = isWin ? '🏆' : '💀';
                    document.getElementById('res-title').textContent = isWin ? 'Mission Success' : 'Mission Failed';
                    document.getElementById('res-title').style.color = isWin ? 'var(--safe)' : 'var(--danger)';
                    document.getElementById('res-msg').textContent = isWin ? 'Objective secured. Gold retrieved.' : 'Neural link severed. Agent lost.';
                    document.getElementById('res-steps').textContent = state.steps;
                    document.getElementById('res-eff').textContent = Math.round(Math.max(0, 100 - (state.steps * 1.5))) + '%';
                    overlay.style.display = 'flex';
                }, 800);
            }
        }

        function hideResult() { document.getElementById('result-overlay').style.display = 'none'; }

        function animate() {
            agentPos.x += (targetPos.x - agentPos.x) * 0.1;
            agentPos.y += (targetPos.y - agentPos.y) * 0.1;
            draw();
            animationId = requestAnimationFrame(animate);
        }

        function draw() {
            const size = Math.min(canvas.parentNode.clientWidth, canvas.parentNode.clientHeight) - 40;
            canvas.width = size; canvas.height = size;
            const w = size / state.cols, h = size / state.rows;

            ctx.clearRect(0, 0, size, size);
            ctx.fillStyle = '#0a0f19'; ctx.fillRect(0,0,size,size);

            for(let i=0; i<state.rows; i++) {
                for(let j=0; j<state.cols; j++) {
                    const x = j*w, y = i*h;
                    ctx.strokeStyle = 'rgba(0, 242, 255, 0.05)'; ctx.strokeRect(x, y, w, h);

                    if(state.safe.some(s => s[0]===i && s[1]===j)) {
                        ctx.fillStyle = 'rgba(0, 255, 136, 0.08)'; ctx.fillRect(x+2, y+2, w-4, h-4);
                    } else if(state.danger.some(d => d[0]===i && d[1]===j)) {
                        ctx.fillStyle = 'rgba(255, 0, 85, 0.08)'; ctx.fillRect(x+2, y+2, w-4, h-4);
                    }

                    if(state.visited.some(v => v[0]===i && v[1]===j)) {
                        ctx.strokeStyle = 'rgba(0, 242, 255, 0.2)'; ctx.strokeRect(x+5, y+5, w-10, h-10);
                    }

                    if(state.pits.some(p => p[0]===i && p[1]===j)) drawItem(ctx, x+w/2, y+h/2, w/4, 'pit');
                    if(state.gold[0]===i && state.gold[1]===j) drawItem(ctx, x+w/2, y+h/2, w/4, 'gold');
                    if(state.wumpus && state.wumpus[0]===i && state.wumpus[1]===j) drawItem(ctx, x+w/2, y+h/2, w/4, 'wumpus');
                }
            }
            drawItem(ctx, agentPos.x*w + w/2, agentPos.y*h + h/2, w/3, 'agent');
        }

        function drawItem(ctx, x, y, r, type) {
            ctx.save(); ctx.shadowBlur = 15;
            switch(type) {
                case 'agent':
                    ctx.shadowColor = '#00f2ff'; ctx.fillStyle = '#00f2ff';
                    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2); ctx.fill();
                    ctx.font = `${r}px Arial`; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('👾', x, y);
                    break;
                case 'gold':
                    ctx.shadowColor = '#ffcc00'; ctx.fillStyle = '#ffcc00';
                    ctx.beginPath(); ctx.moveTo(x, y-r); ctx.lineTo(x+r, y); ctx.lineTo(x, y+r); ctx.lineTo(x-r, y); ctx.closePath(); ctx.fill();
                    ctx.font = `${r}px Arial`; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('💎', x, y);
                    break;
                case 'pit':
                    ctx.shadowColor = '#a855f7'; ctx.fillStyle = '#000';
                    ctx.beginPath(); ctx.ellipse(x, y, r, r/2, 0, 0, Math.PI*2); ctx.fill();
                    ctx.strokeStyle = '#a855f7'; ctx.stroke();
                    break;
                case 'wumpus':
                    ctx.shadowColor = '#ff5500'; ctx.font = `${r*1.5}px Arial`; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('🐲', x, y);
                    break;
            }
            ctx.restore();
        }

        function getCellStatus(r, c) {
            if(state.agent[0]===r && state.agent[1]===c) return 'AGENT PRESENT';
            if(state.visited.some(v => v[0]===r && v[1]===c)) return 'SAMPLED';
            if(state.safe.some(s => s[0]===r && s[1]===c)) return 'CERTIFIED SAFE';
            if(state.danger.some(d => d[0]===r && d[1]===c)) return 'DANGER DETECTED';
            return 'UNEXPLORED';
        }

        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const col = Math.floor((e.clientX - rect.left) / (canvas.width / state.cols));
            const row = Math.floor((e.clientY - rect.top) / (canvas.height / state.rows));
            if(row >= 0 && row < state.rows && col >= 0 && col < state.cols) {
                tooltip.style.left = (e.pageX + 15) + 'px'; tooltip.style.top = (e.pageY + 15) + 'px';
                tooltip.innerHTML = `SECTOR [${row}, ${col}]<br><span style="color:var(--text-dim)">Status: ${getCellStatus(row, col)}</span>`;
                tooltip.classList.add('active');
            }
        });
        canvas.addEventListener('mouseleave', () => tooltip.classList.remove('active'));

        window.onload = initGame;
    </script>
</body>
</html>
